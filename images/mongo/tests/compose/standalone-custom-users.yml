services:
  mongodb:
    image: ${MONGODB_IMAGE:-openvidu/mongodb:8.0}
    environment:
      - MONGODB_ROOT_PASSWORD=rootpass123
      - MONGODB_EXTRA_USERNAMES=alice,bob,charlie
      - MONGODB_EXTRA_PASSWORDS=alicepass,bobpass,charliepass
      - MONGODB_EXTRA_DATABASES=alicedb,bobdb,charliedb
    ports:
      - "27017"
