services:
  mongodb:
    image: ${MONGODB_IMAGE:-openvidu/mongodb:8.0}
    environment:
      - MONGODB_ROOT_PASSWORD_FILE=/run/secrets/root-password
      - MONGODB_USERNAME=secretuser
      - MONGODB_PASSWORD_FILE=/run/secrets/user-password
      - MONGODB_DATABASE=secretdb
    volumes:
      - ../fixtures/secrets/root-password.txt:/run/secrets/root-password:ro
      - ../fixtures/secrets/user-password.txt:/run/secrets/user-password:ro
    ports:
      - "27017"
