name: Build and push images

on:
  workflow_dispatch:
    inputs:
      build_minio:
        description: "Build openvidu/minio"
        required: false
        type: boolean
        default: false
      build_mc:
        description: "Build openvidu/minio-client"
        required: false
        type: boolean
        default: false
      build_mongo:
        description: "Build openvidu/mongodb"
        required: false
        type: boolean
        default: false
      build_mimir:
        description: "Build openvidu/grafana-mimir"
        required: false
        type: boolean
        default: false
      update_readme:
        description: "Update README with the security scan report"
        required: false
        type: boolean
        default: false

env:
  DOCKER_BUILD_SUMMARY: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: minio
            context: .
            file: images/minio/Dockerfile
            image: openvidu/minio
          - name: mc
            context: images/mc
            file: images/mc/Dockerfile
            image: openvidu/minio-client
          - name: mongo
            context: images/mongo
            file: images/mongo/Dockerfile
            image: openvidu/mongodb
          - name: mimir
            context: images/mimir
            file: images/mimir/Dockerfile
            image: openvidu/grafana-mimir

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load versions
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=.*$' versions.env >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build variables
        id: vars
        run: |
          if [[ "${{ matrix.name }}" == "mc" ]]; then
            echo "tags=${{ matrix.image }}:RELEASE.$(date -u +%Y-%m-%dT%H-%M-%SZ)" >> $GITHUB_OUTPUT
            echo "build_args=" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.name }}" == "mongo" ]]; then
            echo "tags=${{ matrix.image }}:${{ env.MONGODB_MAJOR_MINOR }},${{ matrix.image }}:${{ env.MONGODB_VERSION }},${{ matrix.image }}:${{ env.MONGODB_VERSION }}-r${{ env.MONGODB_BUILD_NUMBER }},${{ matrix.image }}:latest" >> $GITHUB_OUTPUT
            {
              echo "build_args<<EOF"
              echo "YQ_VERSION=${{ env.YQ_VERSION }}"
              echo "WAIT_FOR_PORT_COMMIT=${{ env.WAIT_FOR_PORT_COMMIT }}"
              echo "RENDER_TEMPLATE_COMMIT=${{ env.RENDER_TEMPLATE_COMMIT }}"
              echo "MONGODB_MAJOR_MINOR=${{ env.MONGODB_MAJOR_MINOR }}"
              echo "MONGODB_VERSION=${{ env.MONGODB_VERSION }}"
              echo "MONGOSH_VERSION=${{ env.MONGOSH_VERSION }}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.name }}" == "minio" ]]; then
            echo "tags=${{ matrix.image }}:${{ env.MINIO_TAG }},${{ matrix.image }}:${{ env.MINIO_TAG }}-r${{ env.MINIO_BUILD_NUMBER }},${{ matrix.image }}:latest" >> $GITHUB_OUTPUT
            echo "build_args=MINIO_TAG=${{ env.MINIO_TAG }}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ matrix.image }}:${{ env.MIMIR_TAG }},${{ matrix.image }}:${{ env.MIMIR_TAG }}-r${{ env.MIMIR_BUILD_NUMBER }},${{ matrix.image }}:latest" >> $GITHUB_OUTPUT
            echo "build_args=MIMIR_TAG=${{ env.MIMIR_TAG }}" >> $GITHUB_OUTPUT
          fi

      - name: Build ${{ matrix.name }} for scanning
        if: |
          (matrix.name == 'minio' && inputs.build_minio) ||
          (matrix.name == 'mc' && inputs.build_mc) ||
          (matrix.name == 'mongo' && inputs.build_mongo) ||
          (matrix.name == 'mimir' && inputs.build_mimir)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          load: true
          push: false
          tags: ${{ matrix.image }}:scan
          build-args: ${{ steps.vars.outputs.build_args }}

      - name: Scan for secrets
        if: |
          (matrix.name == 'minio' && inputs.build_minio) ||
          (matrix.name == 'mc' && inputs.build_mc) ||
          (matrix.name == 'mongo' && inputs.build_mongo) ||
          (matrix.name == 'mimir' && inputs.build_mimir)
        run: echo "Secret scan disabled"
        shell: bash

      - name: Scan for vulnerabilities
        if: |
          (matrix.name == 'minio' && inputs.build_minio) ||
          (matrix.name == 'mc' && inputs.build_mc) ||
          (matrix.name == 'mongo' && inputs.build_mongo) ||
          (matrix.name == 'mimir' && inputs.build_mimir)
        run: echo "Vulnerability scan disabled"
        shell: bash


      - name: Build and push ${{ matrix.name }}
        if: |
          (matrix.name == 'minio' && inputs.build_minio) ||
          (matrix.name == 'mc' && inputs.build_mc) ||
          (matrix.name == 'mongo' && inputs.build_mongo) ||
          (matrix.name == 'mimir' && inputs.build_mimir)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          build-args: ${{ steps.vars.outputs.build_args }}
