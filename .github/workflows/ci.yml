name: CI

on:
  push:
  workflow_dispatch:

jobs:
  test-mongo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/mongo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load versions
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=.*$' ../../versions.env >> "$GITHUB_ENV"

      - name: Fix Docker MTU for GitHub Actions
        run: |
          echo '{"mtu": 1450}' | sudo tee /etc/docker/daemon.json > /dev/null
          sudo systemctl restart docker

      - name: Build image for tests
        run: |
          docker build \
            --build-arg YQ_VERSION="${YQ_VERSION}" \
            --build-arg WAIT_FOR_PORT_VERSION="${WAIT_FOR_PORT_VERSION}" \
            --build-arg RENDER_TEMPLATE_VERSION="${RENDER_TEMPLATE_VERSION}" \
            --build-arg MONGODB_MAJOR_MINOR="${MONGODB_MAJOR_MINOR}" \
            --build-arg MONGODB_VERSION="${MONGODB_VERSION}" \
            --build-arg MONGOSH_VERSION="${MONGOSH_VERSION}" \
            -t openvidu/mongodb:test \
            .

      - name: Install BATS
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run integration tests
        env:
          MONGODB_IMAGE: openvidu/mongodb:test
        run: tests/run-tests.sh

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo ""
          for project in $(docker compose ls -q 2>/dev/null); do
            echo "=== Logs for project: ${project} ==="
            docker compose -p "$project" logs 2>&1 || true
          done

  test-mc:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/mc
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: images/mc/go.mod

      - name: Run integration tests
        run: go test -tags integration -timeout 15m -v ./...

  test-minio:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/minio
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: images/minio/go.mod

      - name: Run integration tests
        run: go test -tags integration -timeout 30m -v ./...

  test-mimir:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load versions
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=.*$' versions.env >> "$GITHUB_ENV"

      - name: Build image for tests
        run: |
          docker build \
            --build-arg MIMIR_TAG="${MIMIR_TAG}" \
            -t openvidu/grafana-mimir:test \
            -f images/mimir/Dockerfile \
            .

      - name: Smoke test shell
        run: docker run --rm --entrypoint /bin/sh openvidu/grafana-mimir:test -c "echo shell-ok"

      - name: Smoke test runtime user
        run: docker run --rm --entrypoint /bin/sh openvidu/grafana-mimir:test -c 'uid=$(id -u); gid=$(id -g); [ "$uid:$gid" = "1001:1001" ] && echo "user-ok:$uid:$gid"'

      - name: Smoke test mimir binary
        run: |
          version_output="$(docker run --rm openvidu/grafana-mimir:test --version)"
          echo "$version_output"
          case "$version_output" in
            *"Mimir, version "*) ;;
            *)
              echo "Unexpected output from mimir --version"
              exit 1
              ;;
          esac
