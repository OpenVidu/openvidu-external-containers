version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: "/images/mc"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      gomod:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: "/images/minio"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      gomod:
        patterns:
          - "*"
